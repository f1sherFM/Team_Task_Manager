{% extends "base.html" %}

{% block title %}Workspaces | Team Task Manager{% endblock %}

{% block content %}
<section>
    <h1>Your workspaces</h1>
    <p><a href="{% url 'workspace-create' %}">Create workspace</a></p>
    <ul>
        {% for workspace in workspaces %}
            <li><a href="{% url 'workspace-detail' slug=workspace.slug %}">{{ workspace.name }}</a></li>
        {% empty %}
            <li>No workspaces yet.</li>
        {% endfor %}
    </ul>
</section>
{% endblock %}
