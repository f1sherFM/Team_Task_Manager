services:
  - type: web
    name: team-task-manager
    runtime: python
    plan: free
    region: oregon
    buildCommand: ./build.sh
    preDeployCommand: python manage.py migrate --no-input
    startCommand: python -m gunicorn team_task_manager.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    autoDeployTrigger: commit
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: team-task-manager-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DB_SSL_REQUIRE
        value: true
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: WEB_CONCURRENCY
        value: 4

databases:
  - name: team-task-manager-db
    plan: free
    region: oregon
    databaseName: team_task_manager
    user: team_task_manager
